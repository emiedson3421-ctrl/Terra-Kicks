<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terra Kicks</title>

<style>
:root{
  --primary:#8B5A2B;
  --secondary:#F5F0E6;
  --accent:#5C3D1F;
  --white:#ffffff;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif;}
html{scroll-behavior:smooth;}
body{background:var(--secondary);color:var(--accent);}

/* HEADER */
header{
  position:fixed;top:0;width:100%;
  display:flex;justify-content:space-between;align-items:center;
  padding:15px 20px;
  background:rgba(245,240,230,0.9);
  backdrop-filter:blur(10px);
  z-index:1000;
}
.logo{font-weight:700;color:var(--primary);}
nav{display:flex;gap:20px;}
nav a{text-decoration:none;color:var(--accent);}
.cart-btn{background:var(--primary);color:#fff;padding:8px 12px;border-radius:20px;cursor:pointer}

/* HERO */
.hero{
  height:100vh;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  text-align:center;padding:20px;
}
.hero h1{font-size:3rem;color:var(--primary);}
.hero p{margin:10px 0;}
.hero .btn{margin-top:10px;}

/* BOTONES */
.btn{
  background:var(--primary);color:white;
  padding:12px 20px;border:none;border-radius:25px;
  cursor:pointer;transition:.3s;
}
.btn:hover{background:var(--accent);transform:scale(1.05);}

/* BADGES */
.badges{
  display:flex;gap:20px;margin-top:20px;font-size:.9rem;
}

/* GRID */
.catalogo{padding:80px 20px;}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:white;border-radius:15px;padding:15px;
  transition:.3s;
}
.card:hover{transform:translateY(-8px);}
.card img{width:100%;border-radius:10px;}
.price{font-weight:bold;margin:5px 0;}
.card-buttons{display:flex;gap:10px;margin-top:10px;}

/* CART DRAWER */
.cart-drawer{
  position:fixed;
  right:-100%;
  top:0;
  width:300px;
  height:100%;
  background:white;
  box-shadow:-5px 0 20px rgba(0,0,0,0.2);
  padding:20px;
  transition:.3s;
  z-index:2000;
}
.cart-drawer.active{right:0;}
.cart-item{margin:10px 0;font-size:.9rem;}
.close{cursor:pointer;font-weight:bold;}

/* CONTACTO */
.contacto{padding:80px 20px;text-align:center;}
form{max-width:400px;margin:auto;display:flex;flex-direction:column;gap:10px;}
input,textarea{padding:10px;border:1px solid #ccc;border-radius:5px;}

/* FOOTER */
footer{
  background:var(--accent);color:white;text-align:center;padding:20px;
}

/* WHATSAPP FLOAT */
.whatsapp{
  position:fixed;bottom:20px;right:20px;
  background:#25D366;color:white;
  padding:15px;border-radius:50%;
  font-size:1.4rem;
}

/* MOBILE */
@media(max-width:768px){
  nav{display:none;}
}
</style>
</head>

<body>

<header>
  <div class="logo">Terra Kicks</div>
  <nav>
    <a href="#inicio">Inicio</a>
    <a href="#catalogo">Catálogo</a>
    <a href="#contacto">Contacto</a>
  </nav>
  <div class="cart-btn" onclick="toggleCart()">🛒 <span id="count">0</span></div>
</header>

<!-- HERO -->
<section class="hero" id="inicio">
  <h1>Pisá fuerte con estilo</h1>
  <p>Zapatillas premium para dominar la calle</p>
  <button class="btn" onclick="scrollToCatalog()">Ver colección</button>

  <div class="badges">
    <span>🚚 Envíos a todo el país</span>
    <span>💳 Pagos seguros</span>
    <span>⭐ +100 clientes felices</span>
  </div>
</section>

<!-- CATÁLOGO -->
<section class="catalogo" id="catalogo">
  <h2 style="text-align:center;margin-bottom:20px;">Colección</h2>
  <div class="grid" id="productos"></div>
</section>

<!-- CONTACTO -->
<section class="contacto" id="contacto">
  <h2>Contacto</h2>
  <form onsubmit="event.preventDefault(); alert('Mensaje enviado')">
    <input placeholder="Nombre" required>
    <input type="email" placeholder="Email" required>
    <textarea placeholder="Mensaje" required></textarea>
    <button class="btn">Enviar</button>
  </form>
</section>

<footer>
  <p>© 2026 Terra Kicks</p>
</footer>

<!-- CARRITO -->
<div class="cart-drawer" id="cartDrawer">
  <div class="close" onclick="toggleCart()">✖</div>
  <h3>Tu carrito</h3>
  <div id="cartItems"></div>
  <h4 id="total"></h4>
  <button class="btn" onclick="checkout()">Finalizar compra</button>
</div>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/549XXXXXXXXXX" target="_blank">💬</a>

<script>
const productos = [
{name:"Terra Runner",price:89999},
{name:"Duna Classic",price:95500},
{name:"Arena Pro",price:102000},
{name:"Ocre Street",price:87300},
{name:"Cacao High",price:110000},
{name:"Sahara Low",price:92800}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function renderProductos(){
  const cont = document.getElementById("productos");
  productos.forEach(p=>{
    cont.innerHTML += `
    <div class="card">
      <img src="https://via.placeholder.com/400">
      <h3>${p.name}</h3>
      <p class="price">$${p.price.toLocaleString()}</p>
      <div class="card-buttons">
        <button class="btn" onclick="addToCart('${p.name}',${p.price})">Agregar</button>
        <button class="btn" onclick="buyNow('${p.name}')">Comprar</button>
      </div>
    </div>`;
  });
}

function addToCart(name,price){
  cart.push({name,price});
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCart();
}

function updateCart(){
  document.getElementById("count").innerText = cart.length;
  let itemsHTML="";
  let total=0;

  cart.forEach(i=>{
    itemsHTML+=`<div class="cart-item">${i.name} - $${i.price}</div>`;
    total+=i.price;
  });

  document.getElementById("cartItems").innerHTML = itemsHTML;
  document.getElementById("total").innerText = "Total: $" + total.toLocaleString();
}

function toggleCart(){
  document.getElementById("cartDrawer").classList.toggle("active");
}

function buyNow(name){
  window.open(`https://wa.me/549XXXXXXXXXX?text=Hola quiero comprar ${name}`);
}

function checkout(){
  let text="Hola quiero comprar:\n";
  cart.forEach(i=> text += i.name + "\n");
  window.open(`https://wa.me/549XXXXXXXXXX?text=${encodeURIComponent(text)}`);
}

function scrollToCatalog(){
  document.getElementById("catalogo").scrollIntoView();
}

renderProductos();
updateCart();
</script>

</body>
</html>
